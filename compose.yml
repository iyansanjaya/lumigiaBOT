services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: lumigiabot
    restart: always
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/lumigiabot.db
      NODE_ENV: production
    depends_on:
      - web
    networks:
      - lumigiabot-network

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: lumigiabot-web
    restart: always
    ports:
      - "3412:3412"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/lumigiabot.db
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://127.0.0.1:3412/api/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lumigiabot-network

networks:
  lumigiabot-network:
    driver: bridge
