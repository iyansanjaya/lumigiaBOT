services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: lumigiabot
    restart: always
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/lumigiabot.db
      NODE_ENV: production
    depends_on:
      - web
    networks:
      - lumigiabot-network

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: lumigiabot-web
    restart: always
    ports:
      - "3412:3412"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/lumigiabot.db
    networks:
      - lumigiabot-network

networks:
  lumigiabot-network:
    driver: bridge
