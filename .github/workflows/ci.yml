name: CI

on:
  push:
  pull_request:

jobs:
  bot:
    name: Bot checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run smoke

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@11.7.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm smoke
      - run: pnpm build
